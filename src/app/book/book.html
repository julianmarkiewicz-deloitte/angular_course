<div class="book-card">
  <b>{{ book().title }}</b>
  <div>{{ book().synopsis }}</div>
  <div>{{ book().pages }}</div>
  <ul>
    @for (author of book().authors; track author) {
      <li>{{ author }}</li>
    }
  </ul>
  <div>{{ book().price | currency: 'EUR' }}</div>

  @if (longBook()) {
    <div>This is a long book!</div>
  }
  <button [class.disabled]="buttonDisabled()" [disabled]="buttonDisabled()" (click)="handleClick()">
    bump the pages
  </button>

  <button [routerLink]="['/book', book().id, 'edit']">edit book {{ book().id }}</button>
</div>
